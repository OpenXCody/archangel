<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Service worker cleanup: unregister any SW from prior PWA-enabled builds
         and clear the Workbox caches. Safe to run every load — a no-op when
         no SW is registered. Keep until all prior SWs have expired in the wild. -->
    <script>
      (function () {
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (r) { r.unregister(); });
            }).catch(function () {});
          }
          if (window.caches && caches.keys) {
            caches.keys().then(function (keys) {
              keys.forEach(function (k) { caches.delete(k); });
            }).catch(function () {});
          }
        } catch (_) { /* ignore */ }
      })();
    </script>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#60A5FA" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Archangel" />
    
    <!-- SEO -->
    <meta name="description" content="Archangel - US Manufacturing Workforce Intelligence Platform. Explore companies, factories, occupations, and skills." />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icons/icon-32.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    
    <title>Archangel</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
